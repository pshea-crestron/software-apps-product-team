<x-dc>
<helmet>
<link rel="stylesheet" href="assets/crestron-tokens.css">
<style>
  /* Prototype fonts: use the Cerebri Sans Pro stack everywhere (overrides crestron-tokens.css) */
  :root {
    --font-body: 'Cerebri Sans Pro', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --font-display: 'Cerebri Sans Pro', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  #cp-root { position: fixed; inset: 0; font-family: var(--font-body); color: var(--fg); background: var(--bg-muted); -webkit-font-smoothing: antialiased; }
  .cp-btn { font-family: var(--font-body); }
  input[type=range].cp-range { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 999px; background: var(--neutral-200); }
  input[type=range].cp-range::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--crestron-true-blue); cursor: pointer; border: 2px solid #fff; box-shadow: var(--shadow-xs); }
  @keyframes cpPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  @keyframes cpRing { 0%,100% { box-shadow: 0 0 0 0 rgba(67,197,227,0.55); } 50% { box-shadow: 0 0 0 3px rgba(67,197,227,0.0); } }
  @keyframes cpMeter { 0%,100% { transform: scaleY(0.55); } 50% { transform: scaleY(1); } }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--neutral-300); border-radius: 999px; border: 2px solid transparent; background-clip: content-box; }
</style>
</helmet>
<div id="cp-root">{{ screenEl }}</div>

<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;}}">
class Component extends DCLogic {
  // ============ STATIC DATA ============

  DEVICES = (() => {
    const inp = (id, label, signal) => ({ id, label, signal });
    const out = (id, label, signal) => ({ id, label, signal });
    return [
    
      { id: "dm-nax-2xlri", name: "DM-NAX-2XLRI", model: "DM-NAX-2XLRI", manufacturer: "Crestron", room: "studio", type: "AUDIO-DISTRIBUTION", status: "Online", nax: true, source: "discovered",
        inputs: [inp("ain1","Analog XLR In 1","analog_audio"), inp("ain2","Analog XLR In 2","analog_audio"), inp("aes-i1l","AES67 In 1L","aes67"), inp("aes-i1r","AES67 In 1R","aes67")],
        outputs: [out("aout1","Analog Line Out 1","analog_audio"), out("aout2","Analog Line Out 2","analog_audio"), out("aoip-o1l","AoIP Out 1L","aoip"), out("aoip-o1r","AoIP Out 1R","aoip")] },
      { id: "eq-nax-aio", name: "DM-NAX-AUD-IO", model: "DM-NAX-AUD-IO", manufacturer: "Crestron", room: "family-room", type: "DSP", status: "Online", nax: true, source: "discovered",
        inputs: [inp("ain1","Analog Line In 1","analog_audio"), inp("ain2","Analog Line In 2","analog_audio"), inp("aoip-i1l","AoIP In 1L","aoip"), inp("aoip-i1r","AoIP In 1R","aoip")],
        outputs: [out("aout1","Analog Line Out 1","analog_audio"), out("aout2","Analog Line Out 2","analog_audio"), out("aoip-o1l","AoIP Out 1L","aoip"), out("aoip-o1r","AoIP Out 1R","aoip")] },
      { id: "eq-nax-amp", name: "DM-NAX-AMP-X300", model: "DM-NAX-AMP-X300", manufacturer: "Crestron", room: "equipment-room", type: "Amplifier", status: "Online", nax: true, source: "discovered",
        inputs: [inp("ain1","Analog In 1","analog_audio"), inp("ain2","Analog In 2","analog_audio"), inp("ain3","Analog In 3","analog_audio"), inp("ain4","Analog In 4","analog_audio"),
                 inp("aoip-i1l","AoIP In 1L","aoip"), inp("aoip-i1r","AoIP In 1R","aoip"), inp("aoip-i2l","AoIP In 2L","aoip"), inp("aoip-i2r","AoIP In 2R","aoip")],
        outputs: [out("amp1","Amp Out 1","analog_audio"), out("amp2","Amp Out 2","analog_audio"), out("amp3","Amp Out 3","analog_audio"), out("amp4","Amp Out 4","analog_audio"),
                  out("aoip-o1l","AoIP Out 1L","aoip"), out("aoip-o1r","AoIP Out 1R","aoip"), out("aoip-o2l","AoIP Out 2L","aoip"), out("aoip-o2r","AoIP Out 2R","aoip")] },
      { id: "fr-tv", name: "Samsung TV", model: "Samsung QN83S90DAEXZA", manufacturer: "Samsung", room: "family-room", type: "Display", status: "Online", source: "discovered",
        inputs: [inp("hdmi1","HDMI 1","hdmi"), inp("hdmi2","HDMI 2","hdmi"), inp("hdmi3","HDMI 3 (eARC)","hdmi"), inp("hdmi4","HDMI 4","hdmi")],
        outputs: [out("rv1","Room Video 1","hdmi"), out("ra1","Room Audio 1","analog_audio"), out("opt","Optical Out","digital_audio")] },
      { id: "fr-nax-xsp", name: "DM-NAX-XSP", model: "DM-NAX-XSP", manufacturer: "Crestron", room: "family-room", type: "DSP", status: "Online", source: "discovered",
        inputs: [inp("hdmi","HDMI (eARC)","hdmi")],
        outputs: [out("hdmi","HDMI","hdmi"), ],
        outputs: [out("ra1","Room Audio 1","analog_audio")] },
      { id: "fr-sb", name: "Sonos Soundbar", model: "Sonos Arc", manufacturer: "Sonos", room: "family-room", type: "Speaker", status: "Online", source: "discovered",
        inputs: [inp("hdmi","HDMI (eARC)","hdmi")],
        outputs: [out("aoip-o1l","AoIP Out 1L","aoip")] },
      { id: "lr-appletv", name: "Apple TV", model: "Apple TV 4K (3rd Gen)", manufacturer: "Apple", room: "equipment-room", type: "Media Player", status: "Online", source: "discovered",
        inputs: [], outputs: [out("hdmi-out","HDMI Out (eARC)","hdmi"), out("bt-l","Bluetooth Out L","bluetooth"), out("bt-r","Bluetooth Out R","bluetooth")] },
      { id: "lr-tv", name: "LG TV", model: "LG OLED77C3", manufacturer: "LG", room: "living-room", type: "Display", status: "Online", source: "discovered",
        inputs: [inp("hdmi1","HDMI 1","hdmi"), inp("hdmi2","HDMI 2","hdmi"), inp("hdmi3","HDMI 3 (eARC)","hdmi"), inp("hdmi4","HDMI 4","hdmi")],
        outputs: [out("rv1","Room Video 1","hdmi"), out("ra1","Room Audio 1","analog_audio"), out("opt","Optical Out","digital_audio")] },
      { id: "lr-btio", name: "DM-NAX-BTIO-1G", model: "DM-NAX-BTIO-1G", manufacturer: "Crestron", room: "living-room", type: "DSP", status: "Online", nax: true, source: "discovered",
        inputs: [inp("ain1","Analog Line In 1","analog_audio"), inp("ain2","Analog Line In 2","analog_audio"), inp("bt-l","Bluetooth In L","bluetooth"), inp("bt-r","Bluetooth In R","bluetooth"),
                 inp("aoip-i1l","AoIP In 1L","aoip"), inp("aoip-i1r","AoIP In 1R","aoip"), inp("aoip-i2l","AoIP In 2L","aoip"), inp("aoip-i2r","AoIP In 2R","aoip")],
        outputs: [out("aout-l","Analog Line Out L","analog_audio"), out("aout-r","Analog Line Out R","analog_audio"), out("usb-l","USB Out L","digital_audio"), out("usb-r","USB Out R","digital_audio"),
                  out("aoip-o1l","AoIP Out 1L","aoip"), out("aoip-o1r","AoIP Out 1R","aoip"), out("aoip-o2l","AoIP Out 2L","aoip"), out("aoip-o2r","AoIP Out 2R","aoip")] },
      { id: "dm-nvx-364", name: "DM-NVX-384", model: "DM-NVX-384", manufacturer: "Crestron", room: "equipment-room", type: "VIDEO-DISTRIBUTION", status: "Online", nax: false, source: "discovered",
        inputs: [inp("hdmi1","HDMI1","hdmi"), inp("hdmi2","HDMI2 (eARC)","hdmi")],
        outputs: [out("hdmi","HDMI (eARC)","hdmi"), out("aout1","Analog Line Out 1","analog_audio"), out("aoip-o1l","AoIP Out 1L","aoip"), out("aoip-o1r","AoIP Out 1R","aoip")] },
    ];
  })();

  INITIAL_ROUTES = [
    { id: "r1", fromDevice: "lr-appletv", fromPort: "hdmi-out", toDevice: "lr-tv", toPort: "hdmi1", signalType: "hdmi" },
    { id: "r7", fromDevice: "eq-nax-aio", fromPort: "aoip-o1l", toDevice: "eq-nax-amp", toPort: "aoip-i1l", signalType: "aoip" },
    { id: "r8", fromDevice: "eq-nax-aio", fromPort: "aoip-o1r", toDevice: "eq-nax-amp", toPort: "aoip-i1r", signalType: "aoip" },
    { id: "r9", fromDevice: "lr-btio", fromPort: "aoip-o1l", toDevice: "eq-nax-amp", toPort: "aoip-i2l", signalType: "aoip" },
    { id: "r10", fromDevice: "lr-btio", fromPort: "aoip-o1r", toDevice: "eq-nax-amp", toPort: "aoip-i2r", signalType: "aoip" },
  ];

  ROOM_LAYOUT = {
    "equipment-room": { x: 500, y: 40, label: "Equipment Room" },
    "kitchen": { x: 700, y: 700, label: "Kitchen" },
    "living-room": { x: 0, y: 700, label: "Living Room" },
  };

  SIGNAL_COLORS = { hdmi: "#003B71", analog_audio: "#CF9F02", digital_audio: "#007CA0", aoip: "#43C5E3", voip: "#A79F88", bluetooth: "#1AA3C6" };
  SIGNAL_LABELS = { hdmi: "HDMI", analog_audio: "Analog", digital_audio: "Digital", aoip: "AoIP", voip: "VoIP", bluetooth: "BT" };

  CARD_W = 240; PORT_H = 26; HEADER_H = 52; CARD_PAD = 8; DSP_FOOTER_H = 58; NAX_WIDGET_H = 34; STORAGE_KEY = "configurePro.v1"; GRID = 24;

  // ============ STATE ============
  state = {
    screen: "main",
    tab: "routing",
    sel: { id: "whole-system", type: "system", name: "Whole System" },
    expanded: { "1st-floor": true },
    expandedRooms: {},
    routes: this.INITIAL_ROUTES,
    positions: this.buildDevicePositions(),
    routingView: "canvas",
    signalFilter: this.buildSignalFilter(),
    deviceDsp: {},
    collapsedDevices: {},
    hiddenPorts: {},
    portSel: {},
    vp: { x: 0, y: 0, z: 0.45 },
    selectedDev: null,
    tracedChain: null,
    outOfOrder: [],
    live: true,
    telemetryOpen: false,
    telemetry: { canvasInteractions: 0, gridInteractions: 0, routeAttempts: 0, routeSuccess: 0, routeInvalid: 0, dspAdjust: 0, traceSessions: 0, layoutRestores: 0, maxLatency: 0, events: [] },
  };

  // ============ HELPERS ============
  isDspCapable(dev) { return dev.type === "DSP" || dev.type === "Amplifier" || dev.type === "AV Receiver"; }
  headerOffset(dev) { return this.HEADER_H + (dev.nax ? this.NAX_WIDGET_H : 0); }

  // ---- Collapse / hide-unconnected-ports (ported from prototype) ----
  // When a device is collapsed we only render ports that carry an active route.
  isCollapsed(devId) { return !!(this.state && this.state.collapsedDevices && this.state.collapsedDevices[devId]); }
  // A port is dropped from the layout when: the device is collapsed and the port carries no
  // route, its signal type is filtered off via the legend (B-34), or it has been hidden
  // individually. All three remove the port from the card so it resizes to reclaim the space.
  isPortHidden(devId, side, portId) { const arr = this.state.hiddenPorts?.[devId]; return !!arr && arr.includes(side + ":" + portId); }
  portShown(dev, p, side) {
    if (this.isCollapsed(dev.id) && !this.portHasSignal(dev.id, p.id, side)) return false;
    if (!this.signalVisible(p.signal)) return false;
    if (this.isPortHidden(dev.id, side, p.id)) return false;
    return true;
  }
  visibleInputs(dev) { return dev.inputs.filter(p => this.portShown(dev, p, "input")); }
  visibleOutputs(dev) { return dev.outputs.filter(p => this.portShown(dev, p, "output")); }
  visiblePortRows(dev) { return Math.max(this.visibleInputs(dev).length, this.visibleOutputs(dev).length); }
  toggleCollapse(devId) {
    this.setState(prev => ({ collapsedDevices: { ...prev.collapsedDevices, [devId]: !prev.collapsedDevices[devId] } }));
    this.track("canvasInteractions", "Toggle collapse " + (this.deviceById(devId)?.name || devId));
  }

  // ---- Individual port hiding ----
  isPortSel(devId, side, portId) { return (this.state.portSel[devId] || []).includes(side + ":" + portId); }
  hasPortSel(devId) { return (this.state.portSel[devId] || []).length > 0; }
  hasHiddenPorts(devId) { return (this.state.hiddenPorts[devId] || []).length > 0; }
  togglePortSel(devId, side, portId) {
    const key = side + ":" + portId;
    this.setState(prev => {
      const cur = new Set(prev.portSel[devId] || []);
      cur.has(key) ? cur.delete(key) : cur.add(key);
      const next = { ...prev.portSel };
      if (cur.size) next[devId] = [...cur]; else delete next[devId];
      return { portSel: next };
    });
  }
  commitHidePorts(devId) {
    this.setState(prev => {
      const sel = prev.portSel[devId] || [];
      if (!sel.length) return {};
      const cur = new Set(prev.hiddenPorts[devId] || []);
      sel.forEach(k => cur.add(k));
      const hp = { ...prev.hiddenPorts, [devId]: [...cur] };
      const ps = { ...prev.portSel }; delete ps[devId];
      return { hiddenPorts: hp, portSel: ps };
    });
    this.track("canvasInteractions", "Hide ports on " + (this.deviceById(devId)?.name || devId));
  }
  // Unhide: return hidden ports to the pending-selection state (shown again, highlighted red with
  // the red X) so they can be re-hidden as-is or individually unselected before re-hiding.
  unhideToSelection(devId) {
    this.setState(prev => {
      const hidden = prev.hiddenPorts[devId] || [];
      if (!hidden.length) return {};
      const sel = new Set(prev.portSel[devId] || []);
      hidden.forEach(k => sel.add(k));
      const hp = { ...prev.hiddenPorts }; delete hp[devId];
      return { portSel: { ...prev.portSel, [devId]: [...sel] }, hiddenPorts: hp };
    });
    this.track("canvasInteractions", "Unhide ports on " + (this.deviceById(devId)?.name || devId));
  }
  // Hide a single port directly (used by the Matrix row/column hide controls). Writes to the
  // same hiddenPorts state the canvas uses, so both views stay in sync automatically.
  hidePort(devId, side, portId) {
    const key = side + ":" + portId;
    this.setState(prev => {
      const cur = new Set(prev.hiddenPorts[devId] || []); cur.add(key);
      const ps = { ...prev.portSel };
      if (ps[devId]) { const s2 = new Set(ps[devId]); s2.delete(key); if (s2.size) ps[devId] = [...s2]; else delete ps[devId]; }
      return { hiddenPorts: { ...prev.hiddenPorts, [devId]: [...cur] }, portSel: ps };
    });
    this.track("gridInteractions", "Hide " + side + " port (grid)");
  }
  // Matrix "show hidden" mirrors the canvas eye: hidden ports return to the pending-selection state
  // (red X on the canvas) rather than being cleared outright.
  unhideInViewToSelection(devices) {
    this.setState(prev => {
      const hp = { ...prev.hiddenPorts }, ps = { ...prev.portSel };
      devices.forEach(d => {
        const hidden = hp[d.id]; if (!hidden || !hidden.length) return;
        const sel = new Set(ps[d.id] || []); hidden.forEach(k => sel.add(k)); ps[d.id] = [...sel];
        delete hp[d.id];
      });
      return { hiddenPorts: hp, portSel: ps };
    });
    this.track("gridInteractions", "Unhide ports (re-select) from grid");
  }

  cardHeight(dev, showDsp = false) {
    // Height tracks only the visible rows so the card resizes when ports are collapsed,
    // signal-filtered (B-34), or individually hidden. Always reserve at least one row.
    const n = Math.max(this.visiblePortRows(dev), 1);
    const base = this.headerOffset(dev) + n * this.PORT_H + this.CARD_PAD * 2;
    return base + (showDsp && this.isDspCapable(dev) ? this.DSP_FOOTER_H : 0);
  }
  portY(dev, portId, side) {
    const ports = side === "input" ? this.visibleInputs(dev) : this.visibleOutputs(dev);
    const idx = ports.findIndex(p => p.id === portId);
    if (idx < 0) return this.headerOffset(dev) + this.CARD_PAD;
    return this.headerOffset(dev) + this.CARD_PAD + idx * this.PORT_H + this.PORT_H / 2;
  }
  buildDevicePositions() {
    const pos = {}; const roomDevices = {};
    this.DEVICES.forEach(d => { (roomDevices[d.room] = roomDevices[d.room] || []).push(d); });
    Object.entries(roomDevices).forEach(([room, devs]) => {
      const rl = this.ROOM_LAYOUT[room] || { x: 0, y: 0 };
      devs.forEach((dev, i) => {
        const col = i % 2, row = Math.floor(i / 2), h = this.cardHeight(dev);
        pos[dev.id] = { x: rl.x + 24 + col * 280, y: rl.y + 40 + row * (h + 30) };
      });
    });
    return pos;
  }
  allRooms() {
    const rooms = [];
    this.ROOMS_TREE.forEach(n => { if (n.type === "room") rooms.push({ id: n.id, name: n.name }); if (n.children) n.children.forEach(c => rooms.push({ id: c.id, name: c.name })); });
    return rooms;
  }
  devicesInRoom(roomId) { return this.DEVICES.filter(d => d.room === roomId); }
  devicesInFloor(floorId) { const f = this.ROOMS_TREE.find(n => n.id === floorId); if (!f?.children) return []; return f.children.flatMap(c => this.devicesInRoom(c.id)); }
  deviceById(id) { return this.DEVICES.find(d => d.id === id); }
  // Bluetooth ports are shown on devices for completeness but are not routeable —
  // they render greyed-out and never expose valid connection options.
  isRouteable(signal) { return signal !== "bluetooth"; }
  signalsCompatible(a, b) { return !!a && !!b && a === b && this.isRouteable(a); }

  // ============ SIGNAL-TYPE FILTER (B-34) ============
  // All signal types visible by default; user unselects the ones they don't want to see.
  buildSignalFilter() {
    const f = {};
    Object.keys(this.SIGNAL_LABELS).forEach(k => { f[k] = true; });
    return f;
  }
  signalVisible(type) { const f = this.state.signalFilter || {}; return f[type] !== false; }
  toggleSignalFilter(type) {
    this.setState(prev => ({ signalFilter: { ...prev.signalFilter, [type]: prev.signalFilter[type] === false ? true : false } }));
    this.track("canvasInteractions", "Filter " + (this.SIGNAL_LABELS[type] || type));
  }
  setAllSignalFilters(on) {
    const f = {};
    Object.keys(this.SIGNAL_LABELS).forEach(k => { f[k] = on; });
    this.setState({ signalFilter: f });
    this.track("canvasInteractions", on ? "Filter show all" : "Filter hide all");
  }
  // Shared interactive legend used by both the Routing Map and the Matrix so the two views stay
  // consistent. Each symbol is the same small colored circle used for device ports; Bluetooth is
  // shown greyed-out since it is not routeable.
  SignalLegend(extraStyle) {
    const R = React.createElement;
    const legendKeys = Object.keys(this.SIGNAL_LABELS).filter(k => this.DEVICES.some(d => [...d.inputs, ...d.outputs].some(p => p.signal === k)));
    const anyHidden = legendKeys.some(k => !this.signalVisible(k));
    return R("div", { style: { display: "flex", flexWrap: "wrap", alignItems: "center", gap: 6, padding: "8px 10px", background: "#fff", borderRadius: "var(--radius-md)", border: "1px solid var(--border)", ...(extraStyle || {}) } },
      R("span", { style: { fontSize: 9, fontWeight: 800, textTransform: "uppercase", letterSpacing: "0.06em", color: "var(--fg-subtle)", marginRight: 2 } }, "Filter"),
      legendKeys.map(k => {
        const on = this.signalVisible(k);
        const routeable = this.isRouteable(k);
        const dotCol = !routeable ? "var(--neutral-400)" : this.SIGNAL_COLORS[k];
        return R("button", { key: k, onClick: () => this.toggleSignalFilter(k), className: "cp-btn", title: !routeable ? this.SIGNAL_LABELS[k] + " is not routeable" : (on ? "Hide " + this.SIGNAL_LABELS[k] : "Show " + this.SIGNAL_LABELS[k]),
          style: { display: "flex", alignItems: "center", gap: 5, fontSize: 10.5, fontWeight: 600, cursor: "pointer", padding: "3px 8px", borderRadius: "var(--radius-pill)",
            border: `1px solid ${on ? (routeable ? this.SIGNAL_COLORS[k] : "var(--border)") : "var(--border)"}`, background: on ? "#fff" : "var(--neutral-100)", color: on ? "var(--fg)" : "var(--fg-subtle)", opacity: on ? 1 : 0.6, transition: "all 0.15s" } },
          R("div", { style: { width: 10, height: 10, borderRadius: "50%", boxSizing: "border-box", border: `2px solid ${on ? dotCol : "var(--neutral-300)"}`, background: !routeable ? "var(--neutral-300)" : (on ? dotCol : "#fff") } }),
          this.SIGNAL_LABELS[k] + (routeable ? "" : " · not routeable"));
      }),
      anyHidden ? R("button", { onClick: () => this.setAllSignalFilters(true), className: "cp-btn", style: { fontSize: 10, fontWeight: 700, cursor: "pointer", padding: "3px 8px", borderRadius: "var(--radius-pill)", border: "none", background: "var(--blue-50)", color: "var(--crestron-true-blue)" } }, "Show all") : null);
  }

  // ============ LIFECYCLE / PERSISTENCE (A-02) ============
  componentDidMount() {
    try {
      const raw = localStorage.getItem(this.STORAGE_KEY);
      if (raw) {
        const s = JSON.parse(raw);
        this.setState(prev => ({
          positions: s.positions || prev.positions,
          routes: s.routes || prev.routes,
          deviceDsp: s.deviceDsp || prev.deviceDsp,
          hiddenPorts: s.hiddenPorts || prev.hiddenPorts,
          vp: s.vp || prev.vp,
          expanded: s.expanded || prev.expanded,
          telemetry: { ...prev.telemetry, ...(s.telemetry || {}), layoutRestores: (s.telemetry?.layoutRestores || 0) + 1 },
        }));
      }
    } catch (e) {}
  }
  persist() {
    try {
      const { positions, routes, deviceDsp, hiddenPorts, vp, expanded, telemetry } = this.state;
      localStorage.setItem(this.STORAGE_KEY, JSON.stringify({ positions, routes, deviceDsp, hiddenPorts, vp, expanded, telemetry }));
    } catch (e) {}
  }
  componentDidUpdate() {
    const s = this.state;

        rows.map(([k, v, c]) => R("div", { key: k, style: { display: "flex", justifyContent: "space-between", padding: "11px 16px", borderBottom: "1px solid var(--neutral-100)", fontSize: 13 } }, R("span", { style: { color: "var(--fg-muted)" } }, k), R("span", { style: { color: c || "var(--fg)", fontWeight: 600 } }, v)))),
      R("div", { style: { background: "#fff", borderRadius: "var(--radius-lg)", border: "1px solid var(--border)", overflow: "hidden", marginTop: 14, boxShadow: "var(--shadow-xs)" } }, sectionHdr("Ports"),
        R("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr" } },
          R("div", { style: { borderRight: "1px solid var(--border)" } }, R("div", { style: { padding: "7px 16px", fontSize: 10, fontWeight: 700, color: "var(--crestron-mid-blue)", textTransform: "uppercase", borderBottom: "1px solid var(--border)", letterSpacing: "0.05em" } }, `Inputs (${device.inputs.length})`),
            device.inputs.map(p => R("div", { key: p.id, style: { display: "flex", alignItems: "center", gap: 7, padding: "7px 16px", borderBottom: "1px solid var(--neutral-100)", fontSize: 12 } }, R("div", { style: { width: 6, height: 6, borderRadius: "50%", background: this.SIGNAL_COLORS[p.signal] } }), p.label))),
          R("div", null, R("div", { style: { padding: "7px 16px", fontSize: 10, fontWeight: 700, color: "var(--success)", textTransform: "uppercase", borderBottom: "1px solid var(--border)", letterSpacing: "0.05em" } }, `Outputs (${device.outputs.length})`),
            device.outputs.map(p => R("div", { key: p.id, style: { display: "flex", alignItems: "center", gap: 7, padding: "7px 16px", borderBottom: "1px solid var(--neutral-100)", fontSize: 12 } }, R("div", { style: { width: 6, height: 6, borderRadius: "50%", background: this.SIGNAL_COLORS[p.signal] } }), p.label)))) ));
  }

  GenericPanel() {
    const R = React.createElement;
    const s = this.state;
    if (s.sel.type === "system") {
      const stats = [["Rooms", this.allRooms().length], ["Devices", this.DEVICES.length], ["Routes", s.routes.length]];
      return R("div", { style: { flex: 1, overflowY: "auto", padding: "26px 30px", background: "var(--bg-muted)" } },
        R("h2", { style: { fontSize: 22, fontWeight: 700, margin: "0 0 20px", color: "var(--fg-strong)", fontFamily: "var(--font-display)" } }, "Whole System"),
        R("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 14 } }, stats.map(([k, v]) => R("div", { key: k, style: { background: "#fff", borderRadius: "var(--radius-lg)", border: "1px solid var(--border)", padding: "16px 18px", boxShadow: "var(--shadow-xs)" } },
          R("div", { style: { fontSize: 11, color: "var(--fg-subtle)", marginBottom: 6, textTransform: "uppercase", fontWeight: 700, letterSpacing: "0.06em" } }, k), R("div", { style: { fontSize: 28, fontWeight: 800, color: "var(--crestron-true-blue)", fontFamily: "var(--font-display)" } }, v)))));
    }
    if (s.sel.type === "floor") {
      const floor = this.ROOMS_TREE.find(n => n.id === s.sel.id);
      return R("div", { style: { flex: 1, overflowY: "auto", padding: "26px 30px", background: "var(--bg-muted)" } },
        R("h2", { style: { fontSize: 22, fontWeight: 700, margin: "0 0 4px", color: "var(--fg-strong)", fontFamily: "var(--font-display)" } }, s.sel.name + " Configuration"),
        R("p", { style: { color: "var(--fg-muted)", fontSize: 13, marginBottom: 18 } }, "Room group details"),
        R("div", { style: { background: "#fff", borderRadius: "var(--radius-lg)", border: "1px solid var(--border)", padding: "18px 20px", boxShadow: "var(--shadow-xs)" } },
          R("div", { style: { fontSize: 11, fontWeight: 700, textTransform: "uppercase", color: "var(--fg-subtle)", marginBottom: 10, letterSpacing: "0.06em" } }, "Included rooms"),
          R("div", { style: { display: "flex", flexWrap: "wrap", gap: 7 } }, floor?.children?.map(r => R("span", { key: r.id, style: { padding: "5px 11px", borderRadius: "var(--radius-pill)", border: "1px solid var(--border)", fontSize: 12, background: "var(--bg-subtle)", color: "var(--fg)" } }, r.name)))));
    }
    if (s.sel.type === "room") {
      const devs = this.devicesInRoom(s.sel.id);
      const toggle = (on) => R("div", { style: { width: 42, height: 24, borderRadius: 12, background: on ? "var(--success)" : "var(--neutral-300)", position: "relative", flexShrink: 0 } }, R("div", { style: { position: "absolute", right: on ? 2 : 20, top: 2, width: 20, height: 20, borderRadius: "50%", background: "#fff", transition: "right var(--dur-fast)", boxShadow: "var(--shadow-xs)" } }));
      return R("div", { style: { flex: 1, overflowY: "auto", padding: "26px 30px", background: "var(--bg-muted)" } },
        R("h2", { style: { fontSize: 22, fontWeight: 700, margin: "0 0 4px", color: "var(--fg-strong)", fontFamily: "var(--font-display)" } }, s.sel.name + " Configuration"),
        R("p", { style: { color: "var(--fg-muted)", fontSize: 13, marginBottom: 18 } }, `Room details \u00b7 ${devs.length} devices`),
        R("div", { style: { background: "#fff", borderRadius: "var(--radius-lg)", border: "1px solid var(--border)", padding: "8px 18px", boxShadow: "var(--shadow-xs)" } },
          R("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 0" } }, R("span", { style: { fontSize: 13, color: "var(--fg)" } }, "Show in end-user UI"), toggle(true)),
          R("div", { style: { height: 1, background: "var(--neutral-100)" } }),
          R("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 0" } }, R("span", { style: { fontSize: 13, color: "var(--fg)" } }, "Voice Control"), toggle(true))));
    }
    return R("div", { style: { flex: 1, display: "flex", alignItems: "center", justifyContent: "center", color: "var(--fg-muted)" } }, "Select an item");
  }

  resetTelemetry() { this.setState(p => ({ telemetry: { canvasInteractions: 0, gridInteractions: 0, routeAttempts: 0, routeSuccess: 0, routeInvalid: 0, dspAdjust: 0, traceSessions: 0, layoutRestores: p.telemetry.layoutRestores, maxLatency: 0, events: [] } })); }
  TelemetryPanel() {
    const R = React.createElement;
    const t = this.state.telemetry;
    const canvasShare = (t.canvasInteractions + t.gridInteractions) > 0 ? Math.round((t.canvasInteractions / (t.canvasInteractions + t.gridInteractions)) * 100) : 0;
    const dropRate = t.routeAttempts > 0 ? Math.round((t.routeSuccess / t.routeAttempts) * 100) : 100;
    const stat = (label, value, sub, story) => R("div", { style: { background: "var(--bg-subtle)", border: "1px solid var(--border)", borderRadius: "var(--radius-md)", padding: "12px 13px" } },
      R("div", { style: { fontSize: 10, fontWeight: 700, color: "var(--fg-subtle)", textTransform: "uppercase", letterSpacing: "0.05em", display: "flex", justifyContent: "space-between" } }, label, R("span", { style: { color: "var(--crestron-mid-blue)", fontWeight: 800 } }, story)),
      R("div", { style: { fontSize: 24, fontWeight: 800, color: "var(--crestron-true-blue)", fontFamily: "var(--font-display)", lineHeight: 1.1, marginTop: 4 } }, value),
      sub ? R("div", { style: { fontSize: 10.5, color: "var(--fg-muted)", marginTop: 2 } }, sub) : null);
    return R("div", { style: { width: 360, flexShrink: 0, background: "#fff", borderLeft: "1px solid var(--border)", display: "flex", flexDirection: "column", boxShadow: "var(--shadow-lg)" } },
      R("div", { style: { padding: "16px 18px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", gap: 10 } },
        this.ic("activity", 18, "var(--crestron-true-blue)"),
        R("div", { style: { flex: 1 } }, R("div", { style: { fontSize: 15, fontWeight: 700, color: "var(--fg-strong)" } }, "Telemetry"), R("div", { style: { fontSize: 10.5, color: "var(--fg-muted)" } }, "Product analytics \u00b7 this session")),
        R("button", { onClick: () => this.setState({ telemetryOpen: false }), className: "cp-btn", style: { background: "none", border: "none", cursor: "pointer", display: "flex", padding: 4, color: "var(--fg-muted)" } }, this.ic("x", 18))),
      R("div", { style: { height: 2, background: "var(--divider-accent)" } }),
      R("div", { style: { flex: 1, overflowY: "auto", padding: 16, display: "flex", flexDirection: "column", gap: 10 } },
        R("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 } },
          stat("Canvas share", canvasShare + "%", "target \u226570% of routing", "A-27"),
          stat("Drag-drop success", dropRate + "%", `${t.routeSuccess}/${t.routeAttempts} attempts`, "A-28"),
          stat("Invalid blocked", t.routeInvalid, "constraint enforcement", "A-28"),
          stat("Trace sessions", t.traceSessions, "troubleshooting flows", "A-29"),
          stat("DSP adjustments", t.dspAdjust, "gain / mute in-product", "A-30"),
          stat("Canvas vs grid", `${t.canvasInteractions} / ${t.gridInteractions}`, "interactions by surface", "A-31"),
          stat("Peak latency", Math.round(t.maxLatency) + "ms", "target <200ms", "A-33"),
          stat("Layout restores", t.layoutRestores, "persistence success", "A-02"),
        ),
        R("div", { style: { fontSize: 10, fontWeight: 700, color: "var(--fg-subtle)", textTransform: "uppercase", letterSpacing: "0.06em", marginTop: 4 } }, "Recent events"),
        R("div", { style: { border: "1px solid var(--border)", borderRadius: "var(--radius-md)", overflow: "hidden" } },
          t.events.length ? t.events.slice(0, 18).map((e, i) => R("div", { key: i, style: { display: "flex", justifyContent: "space-between", gap: 8, padding: "6px 11px", fontSize: 11, borderBottom: i < Math.min(17, t.events.length - 1) ? "1px solid var(--neutral-100)" : "none", background: i % 2 ? "var(--neutral-50)" : "#fff" } },
            R("span", { style: { color: "var(--fg)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" } }, e.label),
            R("span", { style: { color: "var(--fg-subtle)", fontFamily: "var(--font-mono)", flexShrink: 0 } }, new Date(e.t).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" }))))
            : R("div", { style: { padding: 16, fontSize: 12, color: "var(--fg-muted)", textAlign: "center" } }, "Interact with the canvas to capture events")),
      ),
      R("div", { style: { padding: 14, borderTop: "1px solid var(--border)", display: "flex", gap: 8 } },
        R("button", { onClick: () => this.resetTelemetry(), className: "cp-btn", style: { flex: 1, padding: "8px 0", borderRadius: "var(--radius-sm)", border: "1px solid var(--border)", background: "#fff", color: "var(--fg-muted)", fontSize: 12, fontWeight: 600, cursor: "pointer" } }, "Reset session"),
        R("div", { style: { flex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 6, padding: "8px 0", borderRadius: "var(--radius-sm)", background: "var(--blue-50)", color: "var(--crestron-true-blue)", fontSize: 11, fontWeight: 600 } }, this.ic("check", 13, "var(--crestron-true-blue)"), "Queryable per system")),
    );
  }

  /*RENDER_METHODS*/
}
</script>
